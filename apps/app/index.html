<!doctype html>
<html class="light" data-theme="amber" lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "@adi-family/sdk-plugin": "/vendor/sdk-plugin/index.js",
          "lit": "/vendor/lit/lit.js",
          "lit/decorators.js": "/vendor/lit/decorators.js"
        }
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADI App</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FFFFFF" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Loading shell: visible instantly, removed when SDK is ready -->
    <div id="loading-shell">
      <style>
        #loading-shell {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 32px;
          background: #FFFFFF;
          font-family: 'Inter', system-ui, sans-serif;
          transition: opacity 0.3s ease;
        }

        #loading-shell.fade-out {
          opacity: 0;
          pointer-events: none;
        }

        /* Animated SVG logo */
        .loading-logo svg {
          animation: logoEntry 1.2s ease-out both;
        }

        .loading-logo .outer-hex {
          stroke-dasharray: 700;
          stroke-dashoffset: 700;
          animation: drawPath 1.5s ease-out 0.3s forwards;
        }

        .loading-logo .inner-hex {
          stroke-dasharray: 500;
          stroke-dashoffset: 500;
          animation: drawPath 1.5s ease-out 0.6s forwards;
        }

        .loading-logo .node-line {
          stroke-dasharray: 60;
          stroke-dashoffset: 60;
          animation: drawPath 0.6s ease-out 1.2s forwards;
        }

        .loading-logo .core-glow {
          animation: coreGlow 3s ease-in-out infinite, coreFadeIn 0.8s ease-out 1s both;
        }

        .loading-logo .core {
          animation: coreFadeIn 0.8s ease-out 1.1s both;
        }

        .loading-logo .node-dot {
          animation: nodePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .loading-logo .node-dot:nth-child(11) { animation-delay: 1.4s; }
        .loading-logo .node-dot:nth-child(12) { animation-delay: 1.5s; }
        .loading-logo .node-dot:nth-child(13) { animation-delay: 1.6s; }

        @keyframes logoEntry {
          from { opacity: 0; transform: scale(0.8); }
          to { opacity: 1; transform: scale(1); }
        }

        @keyframes drawPath {
          to { stroke-dashoffset: 0; }
        }

        @keyframes coreGlow {
          0%, 100% { r: 30; opacity: 0.4; }
          50% { r: 34; opacity: 0.6; }
        }

        @keyframes coreFadeIn {
          from { opacity: 0; transform: scale(0.5); transform-origin: center; }
          to { opacity: 1; transform: scale(1); transform-origin: center; }
        }

        @keyframes nodePop {
          from { r: 0; }
          to { r: 6; }
        }

        /* Loading steps */
        .loading-steps {
          display: flex;
          flex-direction: column;
          gap: 10px;
          min-width: 200px;
        }

        .loading-step {
          display: flex;
          align-items: center;
          gap: 10px;
          font-size: 13px;
          color: #9CA3AF;
          transition: color 0.3s ease;
        }

        .loading-step.active {
          color: #1A1A2E;
        }

        .loading-step.done {
          color: #9CA3AF;
        }

        .step-icon {
          width: 16px;
          height: 16px;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
        }

        .step-icon-pending {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #D1D5DB;
        }

        .step-icon-spinner {
          display: none;
          width: 14px;
          height: 14px;
          border: 2px solid #E5E7EB;
          border-top-color: #E2A12B;
          border-radius: 50%;
          animation: shell-spin 0.7s linear infinite;
        }

        .step-icon-check {
          display: none;
          color: #22C55E;
          font-size: 14px;
          line-height: 1;
        }

        .loading-step.active .step-icon-pending { display: none; }
        .loading-step.active .step-icon-spinner { display: block; }

        .loading-step.done .step-icon-pending { display: none; }
        .loading-step.done .step-icon-spinner { display: none; }
        .loading-step.done .step-icon-check { display: block; }

        @keyframes shell-spin {
          to { transform: rotate(360deg); }
        }
      </style>

      <div class="loading-logo">
        <svg width="72" height="72" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line class="node-line" x1="90.866" y1="117.55" x2="66.866" y2="159.119" stroke="#1A1A2E" stroke-width="2"/>
          <line class="node-line" x1="91.1437" y1="84.0693" x2="67.1437" y2="42.5001" stroke="#1A1A2E" stroke-width="2"/>
          <line class="node-line" x1="65.2381" y1="41.3524" x2="99.2381" y2="1.35247" stroke="#1A1A2E" stroke-width="2"/>
          <line class="node-line" x1="167.945" y1="99.6722" x2="184.945" y2="148.672" stroke="#1A1A2E" stroke-width="2"/>
          <line class="node-line" x1="66.8112" y1="158.982" x2="14.8112" y2="148.982" stroke="#1A1A2E" stroke-width="2"/>
          <line class="node-line" x1="119.096" y1="100.517" x2="167.096" y2="100.517" stroke="#1A1A2E" stroke-width="2"/>
          <path class="outer-hex" d="M98.25 2.74219C99.3329 2.11705 100.667 2.11705 101.75 2.74219L183.353 49.8555C184.435 50.4807 185.103 51.6363 185.103 52.8867V147.113C185.103 148.364 184.435 149.519 183.353 150.145L101.75 197.258C100.667 197.883 99.3329 197.883 98.25 197.258L16.6475 150.145C15.5646 149.519 14.8975 148.364 14.8975 147.113V52.8867C14.8975 51.6363 15.5646 50.4807 16.6475 49.8555L98.25 2.74219Z" stroke="#1A1A2E" stroke-width="3"/>
          <path class="inner-hex" d="M167.258 98.25C167.883 99.3329 167.883 100.667 167.258 101.75L135.145 157.372C134.519 158.455 133.364 159.122 132.113 159.122L67.8867 159.122C66.6363 159.122 65.4807 158.455 64.8555 157.372L32.7422 101.75C32.117 100.667 32.117 99.3328 32.7422 98.25L64.8555 42.6279C65.4807 41.5451 66.6364 40.8779 67.8867 40.8779L132.113 40.8779C133.364 40.8779 134.519 41.5451 135.145 42.6279L167.258 98.25Z" stroke="#1A1A2E" stroke-width="3"/>
          <circle class="core-glow" cx="100" cy="100" r="30" fill="#E2A12B" fill-opacity="0.4"/>
          <circle class="core" cx="100" cy="100" r="20" fill="#E2A12B"/>
          <circle class="node-dot" cx="67" cy="158" r="6" fill="#1A1A2E"/>
          <circle class="node-dot" cx="167" cy="101" r="6" fill="#1A1A2E"/>
          <circle class="node-dot" cx="67" cy="42" r="6" fill="#1A1A2E"/>
        </svg>
      </div>

      <div class="loading-steps">
        <div class="loading-step active" data-step="init">
          <span class="step-icon">
            <span class="step-icon-pending"></span>
            <span class="step-icon-spinner"></span>
            <span class="step-icon-check">✓</span>
          </span>
          <span>Initializing</span>
        </div>
        <div class="loading-step" data-step="registry">
          <span class="step-icon">
            <span class="step-icon-pending"></span>
            <span class="step-icon-spinner"></span>
            <span class="step-icon-check">✓</span>
          </span>
          <span>Connecting to registry</span>
        </div>
        <div class="loading-step" data-step="plugins">
          <span class="step-icon">
            <span class="step-icon-pending"></span>
            <span class="step-icon-spinner"></span>
            <span class="step-icon-check">✓</span>
          </span>
          <span>Loading plugins</span>
        </div>
        <div class="loading-step" data-step="signaling">
          <span class="step-icon">
            <span class="step-icon-pending"></span>
            <span class="step-icon-spinner"></span>
            <span class="step-icon-check">✓</span>
          </span>
          <span>Connecting to signaling</span>
        </div>
      </div>
    </div>

    <app-root></app-root>
    <script type="module" src="./src/main.ts"></script>
    <script>
      (function () {
        function activateStep(stepId) {
          var steps = document.querySelectorAll('.loading-step');
          var found = false;
          for (var i = 0; i < steps.length; i++) {
            var step = steps[i];
            if (step.dataset.step === stepId) {
              step.classList.remove('done');
              step.classList.add('active');
              found = true;
            } else if (found) {
              break;
            } else if (step.classList.contains('active')) {
              step.classList.remove('active');
              step.classList.add('done');
            }
          }
        }

        window.addEventListener('loading-step', function (e) {
          activateStep(e.detail);
        });

        var minReady = new Promise(function (r) {
          setTimeout(r, 2000);
        });

        var appReady = new Promise(function (r) {
          window.addEventListener('app-ready', r, { once: true });
        });

        Promise.all([minReady, appReady]).then(function () {
          var steps = document.querySelectorAll('.loading-step');
          for (var i = 0; i < steps.length; i++) {
            steps[i].classList.remove('active');
            steps[i].classList.add('done');
          }
          var el = document.getElementById('loading-shell');
          if (!el) return;
          setTimeout(function () {
            el.classList.add('fade-out');
            el.addEventListener('transitionend', function () {
              el.remove();
            });
          }, 300);
        });
      })();
    </script>
  </body>
</html>
