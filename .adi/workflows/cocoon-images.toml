# Cocoon Docker Images Workflow
# Build and push cocoon image variants (alpine, debian, ubuntu, python, node, full, gpu, custom)

[workflow]
name = "cocoon-images"
description = "Build and release cocoon Docker image variants"

[[inputs]]
name = "variants"
type = "multi-select"
prompt = "Select image variants to build"
options = [
    "default - All standard (alpine, debian, ubuntu, python, node, full)",
    "minimal - Minimal only (alpine, debian)",
    "dev - Dev only (ubuntu, python, node)",
    "alpine - Alpine (~15MB)",
    "debian - Debian (~100MB)",
    "ubuntu - Ubuntu (~150MB)",
    "python - Python (~180MB)",
    "node - Node.js (~200MB)",
    "full - Full (~500MB)",
    "gpu - GPU/CUDA (~2GB)",
]
default = "default - All standard (alpine, debian, ubuntu, python, node, full)"

[[inputs]]
name = "push"
type = "confirm"
prompt = "Push images to registry?"
default = false

[[inputs]]
name = "tag"
type = "input"
prompt = "Image tag (leave empty for 'latest')"
default = ""

[[inputs]]
name = "platform"
type = "select"
prompt = "Target platform(s)"
options = [
    "linux/amd64,linux/arm64 - Both amd64 + arm64 (slower)",
    "linux/amd64 - amd64 only (faster)",
    "linux/arm64 - arm64 only",
]
default = "linux/amd64 - amd64 only (faster)"

[[steps]]
name = "Build cocoon images"
run = """
# Extract variant names from "name - description" format
VARIANTS_RAW="{{ variants | join('|') }}"
VARIANTS=""
IFS='|' read -ra PARTS <<< "$VARIANTS_RAW"
for part in "${PARTS[@]}"; do
    v=$(echo "$part" | cut -d' ' -f1)
    VARIANTS="$VARIANTS $v"
done
VARIANTS=$(echo "$VARIANTS" | xargs)
PUSH="{{ push }}"
TAG="{{ tag }}"
PLATFORM="{{ platform | split(' ') | first }}"

# Build args
ARGS=""

# Handle variant selection
if echo "$VARIANTS" | grep -q "default"; then
    ARGS="--all"
elif echo "$VARIANTS" | grep -q "minimal"; then
    ARGS="--minimal"
elif echo "$VARIANTS" | grep -q "dev"; then
    ARGS="--dev"
else
    # Individual variants
    for v in $VARIANTS; do
        ARGS="$ARGS --variant $v"
    done
fi

if [ "$PUSH" = "true" ]; then
    ARGS="$ARGS --push"
fi

if [ -n "$TAG" ]; then
    ARGS="$ARGS --tag $TAG"
fi

ARGS="$ARGS --platform $PLATFORM"

info "Building cocoon images: $ARGS"

python3 "$WORKFLOWS_DIR/_core/cocoon_images.py" $ARGS

success "Cocoon images build complete!"
"""
