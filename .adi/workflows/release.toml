# ADI Release Workflow
# Unified release for CLI binary or plugin

[workflow]
name = "release"
description = "Release CLI binary or plugin"

[[inputs]]
name = "target"
type = "select"
prompt = "What to release?"
options = [
    "cli - Build and release adi CLI to GitHub",
    "plugin - Build and publish a plugin to the registry",
    "plugin-related - Build and publish plugin + all related plugins",
]
default = "cli - Build and release adi CLI to GitHub"

# --- CLI inputs ---

[[inputs]]
name = "version"
type = "input"
prompt = "Version to release (e.g., 1.0.1)"
required = true
if = "{{ target | contains('cli') }}"

[[inputs]]
name = "title"
type = "input"
prompt = "Release title (short description)"
default = ""
if = "{{ target | contains('cli') }}"

[[inputs]]
name = "draft"
type = "confirm"
prompt = "Create as draft release?"
default = false
if = "{{ target | contains('cli') }}"

# --- Plugin inputs ---

[[inputs]]
name = "plugin"
type = "select"
prompt = "Select plugin to release"
options_cmd = '''
grep -rl 'package.metadata.plugin' crates/*/Cargo.toml crates/*/*/Cargo.toml crates/*/*/*/Cargo.toml plugins/*/Cargo.toml plugins/*/*/Cargo.toml plugins/*/*/*/Cargo.toml 2>/dev/null | while read f; do
    sed -n 's/^id = "\(.*\)"/\1/p' "$f" | head -1
done | sort -u
'''
autocomplete = true
autocomplete_count = 10
if = "{{ target | contains('plugin') }}"

[[inputs]]
name = "version_bump"
type = "select"
prompt = "Version bump type"
options = [
    "same - Keep current version",
    "patch - Bug fixes (0.0.x)",
    "minor - New features (0.x.0)",
    "major - Breaking changes (x.0.0)",
]
default = "same - Keep current version"
if = "{{ target | contains('plugin') }}"

[[inputs]]
name = "registry_target"
type = "select"
prompt = "Target registry"
options = [
    "cli-beta - cli.registry.beta.withadi.dev",
    "production - registry.withadi.dev",
    "local - adi.test/registry",
    "dry-run - Build only, no publish",
]
default = "cli-beta - cli.registry.beta.withadi.dev"
if = "{{ target | contains('plugin') }}"

# --- Steps ---

[[steps]]
name = "Release"
run = """
TARGET="{{ target | split(' ') | first }}"

case "$TARGET" in
    cli)
        VERSION="{{ version }}"
        TITLE="{{ title }}"
        DRAFT="{{ draft }}"

        ARGS="--version $VERSION"
        if [ -n "$TITLE" ]; then
            ARGS="$ARGS --title \"$TITLE\""
        fi
        if [ "$DRAFT" = "true" ]; then
            ARGS="$ARGS --draft"
        fi

        eval "python3 \"$WORKFLOWS_DIR/_core/release_cli.py\" $ARGS"
        ;;
    plugin)
        PLUGIN="{{ plugin }}"
        REGISTRY="{{ registry_target | split(' ') | first }}"
        BUMP="{{ version_bump | split(' ') | first }}"

        BUMP_FLAG=""
        if [ "$BUMP" != "same" ]; then
            BUMP_FLAG="--bump $BUMP"
        fi

        case "$REGISTRY" in
            cli-beta)
                python3 "$WORKFLOWS_DIR/_core/release_plugin.py" "$PLUGIN" --registry https://cli.registry.beta.withadi.dev $BUMP_FLAG
                ;;
            production)
                python3 "$WORKFLOWS_DIR/_core/release_plugin.py" "$PLUGIN" $BUMP_FLAG
                ;;
            local)
                python3 "$WORKFLOWS_DIR/_core/release_plugin.py" "$PLUGIN" --local $BUMP_FLAG
                ;;
            dry-run)
                python3 "$WORKFLOWS_DIR/_core/release_plugin.py" "$PLUGIN" --no-push $BUMP_FLAG
                ;;
        esac
        ;;
    plugin-related)
        PLUGIN="{{ plugin }}"
        REGISTRY="{{ registry_target | split(' ') | first }}"
        BUMP="{{ version_bump | split(' ') | first }}"

        BUMP_FLAG=""
        if [ "$BUMP" != "same" ]; then
            BUMP_FLAG="--bump $BUMP"
        fi

        REGISTRY_FLAG=""
        case "$REGISTRY" in
            cli-beta) REGISTRY_FLAG="--registry https://cli.registry.beta.withadi.dev" ;;
            local) REGISTRY_FLAG="--local" ;;
            dry-run) REGISTRY_FLAG="--no-push" ;;
        esac

        python3 "$WORKFLOWS_DIR/_core/release_plugin.py" "$PLUGIN" --related $BUMP_FLAG $REGISTRY_FLAG
        ;;
esac
"""
