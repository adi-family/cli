# ADI Service Release Workflow
# Build Linux binaries, Docker images, and optionally push to registry

[workflow]
name = "release"
description = "Build and release service images (cross-compile + Docker)"

[[inputs]]
name = "services"
type = "multi-select"
prompt = "Select services to release (empty for all)"
# Dynamic options: discover services from release.sh ALL_SERVICES
options_cmd = '''
grep '^ALL_SERVICES=' "$WORKFLOWS_DIR/release.sh" 2>/dev/null | sed 's/^ALL_SERVICES="//;s/"$//' | tr ' ' '\n'
'''

[[inputs]]
name = "push"
type = "confirm"
prompt = "Push images to registry?"
default = false

[[inputs]]
name = "tag"
type = "input"
prompt = "Image tag (leave empty for 'latest')"
default = ""

[[steps]]
name = "Release services"
run = """
SERVICES="{{ services | join(' ') }}"
PUSH="{{ push }}"
TAG="{{ tag }}"

# Build args
ARGS=""

if [ -n "$SERVICES" ]; then
    ARGS="$SERVICES"
else
    ARGS="all"
fi

if [ "$PUSH" = "true" ]; then
    ARGS="$ARGS --push"
fi

if [ -n "$TAG" ]; then
    ARGS="$ARGS --tag $TAG"
fi

info "Releasing: $ARGS"

"$WORKFLOWS_DIR/release.sh" $ARGS

success "Release complete!"
"""
