# ADI Coolify Deployment Workflow
# Interactive wrapper for deploy.sh

[workflow]
name = "deploy"
description = "Deploy services to Coolify"

[[inputs]]
name = "action"
type = "select"
prompt = "What do you want to do?"
options = [
    "status - Check all services",
    "deploy - Deploy a service",
    "logs - View deployment logs",
    "watch - Watch deployment progress",
    "list - List recent deployments"
]
default = "status - Check all services"

[[inputs]]
name = "service"
type = "select"
prompt = "Select service"
options = ["all", "auth", "platform", "signaling", "web", "analytics-ingestion", "analytics", "registry"]
default = "all"
if = "{{ action | starts_with('deploy') }}"

[[inputs]]
name = "force_rebuild"
type = "confirm"
prompt = "Force rebuild (no cache)?"
default = false
if = "{{ action | starts_with('deploy') }}"

[[inputs]]
name = "logs_service"
type = "select"
prompt = "Select service"
options = ["auth", "platform", "signaling", "web", "analytics-ingestion", "analytics", "registry"]
if = "{{ action | starts_with('logs') or action | starts_with('watch') or action | starts_with('list') }}"

[[inputs]]
name = "list_count"
type = "input"
prompt = "Number of deployments to show"
default = "5"
if = "{{ action | starts_with('list') }}"

[[steps]]
name = "Run deploy command"
run = """
ACTION="{{ action | split(' ') | first }}"

case "$ACTION" in
    status)
        python3 "$WORKFLOWS_DIR/_core/deploy.py" status
        ;;
    deploy)
        SERVICE="{{ service }}"
        FORCE="{{ force_rebuild }}"
        if [ "$FORCE" = "true" ]; then
            python3 "$WORKFLOWS_DIR/_core/deploy.py" deploy "$SERVICE" --force
        else
            python3 "$WORKFLOWS_DIR/_core/deploy.py" deploy "$SERVICE"
        fi
        ;;
    logs)
        python3 "$WORKFLOWS_DIR/_core/deploy.py" logs "{{ logs_service }}"
        ;;
    watch)
        python3 "$WORKFLOWS_DIR/_core/deploy.py" watch "{{ logs_service }}"
        ;;
    list)
        python3 "$WORKFLOWS_DIR/_core/deploy.py" list "{{ logs_service }}" "{{ list_count }}"
        ;;
esac
"""
env = { COOLIFY_API_KEY = "{{ env.COOLIFY_API_KEY }}" }
