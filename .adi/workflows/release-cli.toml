# ADI CLI Release Workflow
# Build and release adi CLI binary to GitHub

[workflow]
name = "release-cli"
description = "Release CLI binary to GitHub"

[[inputs]]
name = "version"
type = "input"
prompt = "Version to release (e.g., 1.0.1)"
required = true

[[inputs]]
name = "title"
type = "input"
prompt = "Release title (short description)"
default = ""

[[inputs]]
name = "draft"
type = "confirm"
prompt = "Create as draft release?"
default = false

[[steps]]
name = "Release CLI"
run = """
VERSION="{{ version }}"
TITLE="{{ title }}"
DRAFT="{{ draft }}"

ARGS="--version $VERSION"
if [ -n "$TITLE" ]; then
    ARGS="$ARGS --title \"$TITLE\""
fi
if [ "$DRAFT" = "true" ]; then
    ARGS="$ARGS --draft"
fi

eval "python3 \"$WORKFLOWS_DIR/_core/release_cli.py\" $ARGS"
"""
