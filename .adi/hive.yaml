version: '1'

defaults:
  # Script runner uses the user's shell
  hive.runner.script:
    shell: zsh

  # Cocoon spawner runner for containerized cocoon environments
  hive.runner.cocoon-spawner:
    signaling_url: ws://localhost:8080/ws

  # File-based logging with rotation (defaults to ~/.adi/hive/logs/)
  hive.obs.file:
    rotate: true
    max_size: 10MB

  # Console output for development
  hive.obs.stdout:
    format: pretty
    level: info

  # Default health check settings
  hive.health.http:
    timeout: 5s
    interval: 10s
    retries: 3

  hive.health.tcp:
    timeout: 5s
    interval: 5s
    retries: 3

# -----------------------------------------------------------------------------
# Reverse Proxy Configuration
# -----------------------------------------------------------------------------
# Hosts:
#   - adi.test              (local development)
#   - mailpit.adi.test      (local mail UI)

proxy:
  bind:
    - '0.0.0.0:80'
  debug: true

# -----------------------------------------------------------------------------
# Global Observability
# -----------------------------------------------------------------------------

observability:
  plugins:
    - stdout
    - file

# -----------------------------------------------------------------------------
# Global Environment (inherited by all services)
# -----------------------------------------------------------------------------

environment:
  dotenv:
    files:
      - .env.local
  static:
    RUST_LOG: info
    SHOW_VERSION_IN_HEADERS: 'true'

# =============================================================================
# Services
# =============================================================================

services:
  postgres:
    runner:
      type: docker
      docker:
        image: postgres:16-alpine
        container_name: adi-postgres
        ports:
          - '8027:5432'
        volumes:
          - adi-postgres-data:/var/lib/postgresql/data
          - ./.adi/hive/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
        environment:
          POSTGRES_USER: adi
          POSTGRES_PASSWORD: adi
          POSTGRES_DB: adi
        security:
          cap_add:
            - CHOWN
            - FOWNER
            - SETGID
            - SETUID
            - DAC_OVERRIDE
    rollout:
      type: recreate
      recreate:
        ports:
          db: 8027
    healthcheck:
      type: cmd
      cmd:
        command: pg_isready -U adi -h localhost -p 5432
        interval: 5s
        timeout: 5s
        retries: 5
    restart: unless-stopped

  timescaledb:
    runner:
      type: docker
      docker:
        image: timescale/timescaledb:latest-pg16
        container_name: adi-timescaledb
        ports:
          - '8028:5432'
        volumes:
          - adi-timescaledb-data:/var/lib/postgresql/data
          - ./.adi/hive/init-timescaledb.sql:/docker-entrypoint-initdb.d/init-timescaledb.sql:ro
        environment:
          POSTGRES_USER: adi
          POSTGRES_PASSWORD: adi
          POSTGRES_DB: adi_analytics
        security:
          cap_add:
            - CHOWN
            - FOWNER
            - SETGID
            - SETUID
            - DAC_OVERRIDE
    rollout:
      type: recreate
      recreate:
        ports:
          db: 8028
    healthcheck:
      type: cmd
      cmd:
        command: pg_isready -U adi -h localhost -p 5432
        interval: 5s
        timeout: 5s
        retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Infrastructure: TURN Server for WebRTC
  # ---------------------------------------------------------------------------

  coturn:
    runner:
      type: docker
      docker:
        image: coturn/coturn:latest
        container_name: adi-coturn
        network_mode: host
        command:
          - 'turnserver'
          - '-n'
          - '--log-file=stdout'
          - '--listening-port=8039'
          - '--fingerprint'
          - '--lt-cred-mech'
          - '--user=adi:adi'
          - '--realm=adi.test'
          - '--no-tls'
          - '--no-dtls'
          - '--no-cli'
        security:
          cap_add:
            - NET_BIND_SERVICE
            - SETGID
            - SETUID
          no_new_privileges: false
    rollout:
      type: recreate
      recreate:
        ports:
          turn: 8039
    healthcheck:
      type: cmd
      cmd:
        command: 'nc -z localhost 8039 || exit 0'
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Infrastructure: Mail (Local Development)
  # ---------------------------------------------------------------------------

  mailpit:
    runner:
      type: docker
      docker:
        image: axllent/mailpit:latest
        container_name: adi-mailpit
        ports:
          - '8060:1025'
          - '8061:8025'
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8061
          smtp: 8060
    proxy:
      - host: mailpit.adi.test
        path: /
    healthcheck:
      type: tcp
      tcp:
        port: '{{runtime.port.smtp}}'
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Core Services
  # ---------------------------------------------------------------------------

  signaling:
    hooks:
      pre-up:
        - type: script
          run: python3 .adi/workflows/_core/patch.py plugin adi.signaling
        - type: script
          run: >-
            adi tsp-gen generate
            plugins/adi/signaling/signaling.tsp
            -l typescript -s protocol
            --protocol-tag type --protocol-rename snake_case --protocol-enum-name SignalingMessage
            -o apps/app/src/app/generated/signaling
    runner:
      type: script
      script:
        run: adi run adi.signaling start --port 8011
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8011
    proxy:
      - host: adi.test
        path: /api/signaling
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    environment:
      static:
        PORT: '8011'
        HIVE_SECRETS: ${env.HIVE_SECRETS:-}
        AUTH_DOMAIN: ${env.AUTH_DOMAIN:-http://adi.test/api/auth}
        ALLOW_MANUAL_REGISTRATION: 'true'
        WEBRTC_ICE_SERVERS: 'stun:stun.l.google.com:19302,turn:adi.test:8039'
        WEBRTC_TURN_USERNAME: 'adi'
        WEBRTC_TURN_CREDENTIAL: 'adi'
    depends_on:
      - coturn
    restart: on-failure
    # Expose signaling URL for other services
    expose:
      name: signaling
      vars:
        URL: 'ws://localhost:8011/ws'
        PORT: '8011'

  auth:
    hooks:
      pre-up:
        - type: script
          run: python3 .adi/workflows/_core/patch.py plugin adi.auth
    runner:
      type: script
      script:
        run: adi run adi.auth start --port 8012
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8012
    proxy:
      - host: adi.test
        path: /api/auth
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    environment:
      static:
        PORT: '8012'
        DATABASE_URL: 'postgres://adi:adi@localhost:8027/adi_auth'
        JWT_SECRET: ${env.JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
        ADMIN_EMAILS: ${env.ADMIN_EMAILS:-}
        SMTP_HOST: ${env.SMTP_HOST:-localhost}
        SMTP_PORT: ${env.SMTP_PORT:-8060}
        SMTP_USERNAME: ${env.SMTP_USERNAME:-}
        SMTP_PASSWORD: ${env.SMTP_PASSWORD:-}
        SMTP_FROM_EMAIL: ${env.SMTP_FROM_EMAIL:-noreply@adi.test}
        SMTP_FROM_NAME: ${env.SMTP_FROM_NAME:-ADI Noreply}
        SMTP_TLS: ${env.SMTP_TLS:-false}
        UNSAFE_PRINT_EMAIL_CODE_IN_CONSOLE: ${env.UNSAFE_PRINT_EMAIL_CODE_IN_CONSOLE:-true}
    depends_on:
      - postgres
      - mailpit
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Web Frontends
  # ---------------------------------------------------------------------------

  public:
    runner:
      type: script
      script:
        run: cargo run -p website -- dev
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8048
    proxy:
      - host: adi.test
        path: /
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /
    environment:
      static:
        PORT: '8048'
    restart: on-failure

  app:
    hooks:
      pre-up:
        - type: script
          run: >-
            adi tsp-gen generate
            plugins/adi/signaling/signaling.tsp
            -l typescript -s protocol
            --protocol-tag type --protocol-rename snake_case --protocol-enum-name SignalingMessage
            -o apps/app/src/app/generated/signaling
    runner:
      type: script
      script:
        run: npm run dev
        working_dir: apps/app
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8035
    proxy:
      - host: app.adi.test
        path: /
    healthcheck:
      type: tcp
      tcp:
        port: '{{runtime.port.http}}'
    environment:
      static:
        PORT: '8035'
        VITE_LOCAL_PROXY_PORT: '8011'
        VITE_DEFAULT_REGISTRY_URLS: ${env.VITE_DEFAULT_REGISTRY_URLS:-http://adi.test/web-registry}
        VITE_DEFAULT_SIGNALING_URLS: ${env.VITE_DEFAULT_SIGNALING_URLS:-ws://adi.test/api/signaling/ws}
        VITE_REQUIRED_PLUGINS: adi.slots,adi.router,adi.command-palette,adi.auth,adi.signaling,adi.cocoon,adi.actions-feed,adi.plugins
    restart: on-failure

  # ---------------------------------------------------------------------------
  # API Services
  # ---------------------------------------------------------------------------

  analytics-ingestion:
    hooks:
      pre-up:
        - type: script
          run: python3 .adi/workflows/_core/patch.py plugin adi.analytics
    runner:
      type: script
      script:
        run: adi run adi.analytics start-ingestion --port 8022
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8022
    proxy:
      - host: adi.test
        path: /api/analytics-ingestion
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    environment:
      static:
        PORT: '8022'
        DATABASE_URL: 'postgres://adi:adi@localhost:8028/adi_analytics'
    depends_on:
      - timescaledb
    restart: on-failure
    # Expose analytics URL for other services
    expose:
      name: analytics-ingestion
      vars:
        URL: 'http://localhost:8022'

  analytics:
    hooks:
      pre-up:
        - type: script
          run: python3 .adi/workflows/_core/patch.py plugin adi.analytics
    runner:
      type: script
      script:
        run: adi run adi.analytics start-api --port 8023
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8023
    proxy:
      - host: adi.test
        path: /api/analytics
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    environment:
      static:
        PORT: '8023'
        DATABASE_URL: 'postgres://adi:adi@localhost:8028/adi_analytics'
    depends_on:
      - timescaledb
    restart: on-failure

  llm-proxy:
    runner:
      type: script
      script:
        run: cargo run -p llm-proxy-http --bin llm-proxy
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8024
    proxy:
      - host: adi.test
        path: /api/llm-proxy
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    environment:
      static:
        PORT: '8024'
        DATABASE_URL: 'postgres://adi:adi@localhost:8027/adi_llm_proxy'
        JWT_SECRET: ${env.JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
        ENCRYPTION_KEY: ${env.ENCRYPTION_KEY:-5a747f27420b903522ae3746c4ba79b5ecffea02f6bc333fd4da39fb2ef27de4}
        ANALYTICS_URL: 'http://localhost:8022'
    depends_on:
      - postgres
      - analytics-ingestion
    restart: on-failure

  embed-proxy:
    runner:
      type: script
      script:
        run: cargo run -p embed-proxy-http --bin embed-proxy
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8025
    proxy:
      - host: adi.test
        path: /api/embed-proxy
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    environment:
      static:
        PORT: '8025'
        DATABASE_URL: 'postgres://adi:adi@localhost:8027/adi_embed_proxy'
        JWT_SECRET: ${env.JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
        ENCRYPTION_KEY: ${env.ENCRYPTION_KEY:-5a747f27420b903522ae3746c4ba79b5ecffea02f6bc333fd4da39fb2ef27de4}
    depends_on:
      - postgres
    restart: on-failure

  payment:
    hooks:
      pre-up:
        - type: script
          run: python3 .adi/workflows/_core/patch.py plugin adi.payment
    runner:
      type: script
      script:
        run: adi run adi.payment start --port 8040
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8040
    proxy:
      - host: adi.test
        path: /api/payment
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    environment:
      static:
        PORT: '8040'
        DATABASE_URL: 'postgres://adi:adi@localhost:8027/adi_payment'
        JWT_SECRET: ${env.JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
        COINBASE_API_KEY: ${env.COINBASE_API_KEY:-}
        COINBASE_WEBHOOK_SECRET: ${env.COINBASE_WEBHOOK_SECRET:-}
        PADDLE_API_KEY: ${env.PADDLE_API_KEY:-}
        PADDLE_WEBHOOK_SECRET: ${env.PADDLE_WEBHOOK_SECRET:-}
        PADDLE_ENVIRONMENT: ${env.PADDLE_ENVIRONMENT:-sandbox}
    depends_on:
      - postgres
    restart: on-failure

  cli-registry:
    hooks:
      pre-up:
        - type: script
          run: python3 .adi/workflows/_core/patch.py plugin cli.adi.cli-registry-server
    runner:
      type: script
      script:
        run: adi run cli.adi.cli-registry-server start --port 8019
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8019
    proxy:
      - host: adi.test
        path: /api/cli-registry
        strip_prefix: true
      - host: adi.test
        path: /cli-registry
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    restart: on-failure

  web-registry:
    hooks:
      pre-up:
        - type: script
          run: python3 .adi/workflows/_core/patch.py plugin cli.adi.web-registry-server
    runner:
      type: script
      script:
        run: adi run cli.adi.web-registry-server start --port 8063
    rollout:
      type: recreate
      recreate:
        ports:
          http: 8063
    proxy:
      - host: adi.test
        path: /api/web-registry
        strip_prefix: true
      - host: adi.test
        path: /web-registry
        strip_prefix: true
    healthcheck:
      type: http
      http:
        port: '{{runtime.port.http}}'
        path: /health
    restart: on-failure

  cocoon-spawner:
    runner:
      type: cocoon-spawner
      cocoon-spawner:
        image: adi/cocoon-ubuntu:latest
        signaling_url: ws://localhost:8080/ws
    restart: never
