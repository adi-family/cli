[package]
name = "payment-client"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
description = "HTTP client for ADI Payment service — balance checks and debit operations"

[dependencies]
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.19", features = ["serde"] }
thiserror = "2.0"
tracing = "0.1"
