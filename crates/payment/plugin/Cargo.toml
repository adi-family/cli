[package]
name = "payment-plugin"
version = "0.1.0"
edition = "2021"
description = "ADI plugin: Payment HTTP server"
license = "BSL-1.0"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../_lib/lib-plugin-abi-v3" }
payment-core = { path = "../core" }
async-trait = "0.1"
anyhow = "1"

[build-dependencies]
lib-plugin-web-build = { path = "../../_lib/lib-plugin-web-build" }

[package.metadata.plugin]
id = "adi.payment"
name = "Payment"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[[package.metadata.plugin.provides]]
id = "adi.payment.cli"
version = "1.0.0"
description = "CLI commands for payment HTTP server"

[package.metadata.plugin.web_ui]
entry = "web.js"
sandbox = false
plugin_class = "PaymentPlugin"

[package.metadata.plugin.tags]
categories = ["payment", "server", "http"]
