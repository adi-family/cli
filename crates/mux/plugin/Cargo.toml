[package]
name = "mux-plugin"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "ADI plugin: HTTP request fan-out multiplexer"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-prelude = { path = "../../lib/lib-plugin-prelude" }
mux-http = { path = "../http" }

[package.metadata.plugin]
id = "adi.mux"
name = "Mux"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"
api_version = 3

[package.metadata.plugin.cli]
command = "mux"
description = "HTTP request fan-out multiplexer"

[[package.metadata.plugin.provides]]
id = "adi.mux.cli"
version = "1.0.0"
description = "CLI commands for the request multiplexer"

[package.metadata.plugin.tags]
categories = ["proxy", "http", "server"]
