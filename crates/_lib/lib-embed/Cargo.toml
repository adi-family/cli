[package]
name = "lib-embed"
version = "0.8.4"
edition = "2021"
license = "BSL-1.0"
description = "Shared embedding library for ADI tools"
authors = ["ADI Team"]

[features]
default = []
# Enable local fastembed/ONNX - adds ~20MB to binary size
# Without this feature, use adi.embed plugin for embeddings
fastembed = ["dep:fastembed"]

[dependencies]
thiserror = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
tracing = "0.1"
lib-cli-common = { path = "../lib-cli-common" }

# Optional fastembed for local embeddings (large dependency)
fastembed = { version = "4", optional = true }

# For plugin-based embedder
lib-plugin-host = { path = "../lib-plugin-host" }
lib-plugin-abi-v3 = { path = "../lib-plugin-abi-v3" }
tokio = { workspace = true }
