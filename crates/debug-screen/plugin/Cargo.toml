[package]
name = "debug-screen-plugin"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
description = "Debug screen and operations log"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib"]

[dependencies]
lib-plugin-prelude = { path = "../../_lib/lib-plugin-prelude" }

[package.metadata.plugin]
id = "adi.debug-screen"
name = "ADI Debug Screen"
type = "core"

[package.metadata.plugin.compatibility]
min_host_version = "2.0.0"

[[package.metadata.plugin.provides]]
id = "adi.debug-screen.web"
version = "1.0.0"
description = "Debug screen and operations log"

[package.metadata.plugin.web_ui]
entry = "web.js"
sandbox = false

[package.metadata.plugin.tags]
categories = ["web"]
