[package]
name = "logging-plugin"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
description = "ADI Logging plugin - centralized log ingestion and query service"

[lib]
crate-type = ["cdylib"]

[dependencies]
logging-core = { path = "../core" }
lib-logging-core = { path = "../../lib/lib-logging-core" }
lib-plugin-prelude = { path = "../../lib/lib-plugin-prelude" }
lib-plugin-abi-v3 = { path = "../../lib/lib-plugin-abi-v3" }
lib-console-output = { path = "../../lib/lib-console-output" }
lib-env-parse = { path = "../../lib/lib-env-parse" }
lib-http-common = { path = "../../lib/lib-http-common" }

async-trait = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
axum = { version = "0.7", features = ["macros"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.19", features = ["serde", "v4", "v7"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
once_cell = "1.21"

[package.metadata.plugin]
id = "adi.logging"
name = "ADI Logging"
type = "core"

[package.metadata.plugin.compatibility]
api_version = 3
min_host_version = "0.9.0"

[[package.metadata.plugin.provides]]
id = "adi.logging.cli"
version = "0.1.0"
description = "CLI commands for log service and querying"

[package.metadata.plugin.tags]
categories = ["logging", "observability", "tracing"]
