[package]
name = "lib-typespec-api"
version = "0.1.0"
edition = "2021"
description = "TypeSpec parser and multi-language code generator in pure Rust"
license = "MIT"

[lib]
name = "typespec_api"
path = "src/lib.rs"

[[bin]]
name = "tsp-gen"
path = "src/bin/generate.rs"
required-features = ["cli"]

[features]
default = ["cli"]
cli = ["dep:clap", "dep:notify", "dep:ctrlc", "dep:chrono"]

[dependencies]
# Parsing
logos = "0.14"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# CLI (feature-gated)
clap = { version = "4", features = ["derive"], optional = true }

# Utilities
thiserror = "2"
anyhow = "1"
convert_case = "0.6"

# Watch mode (feature-gated, for binary only)
notify = { version = "8", optional = true }
ctrlc = { version = "3", optional = true }
chrono = { version = "0.4", optional = true }

[dev-dependencies]
tempfile = "3"
insta = "1"
