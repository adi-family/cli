[package]
name = "tsp-gen-plugin"
version = "0.2.2"
edition = "2021"
license = "MIT"
description = "ADI plugin for TypeSpec code generation with file watching"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib"]

[dependencies]
typespec_api = { package = "lib-typespec-api", path = "../core" }
lib-plugin-abi-v3 = { path = "../../_lib/lib-plugin-abi-v3" }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
notify = "8"
ctrlc = "3"
chrono = "0.4"

[package.metadata.plugin]
id = "adi.tsp-gen"
name = "TypeSpec Generator"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.cli]
command = "tsp-gen"
description = "Generate code from TypeSpec (.tsp) files"
aliases = ["tsp", "typespec"]

[[package.metadata.plugin.provides]]
id = "adi.tsp-gen.cli"
version = "1.0.0"
description = "CLI commands for TypeSpec code generation"

[package.metadata.plugin.tags]
categories = ["codegen", "api", "typespec", "openapi"]
