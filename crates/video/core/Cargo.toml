[package]
name = "video-core"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
authors = ["ADI Team"]
description = "Core library for ADI Video - programmatic video rendering with FFmpeg"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
tracing = "0.1"
dashmap = "6"
