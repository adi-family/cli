[package]
name = "video-http"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
authors = ["ADI Team"]
description = "HTTP server for ADI Video rendering service"

[[bin]]
name = "video-http"
path = "src/main.rs"

[dependencies]
video-core = { path = "../core" }
lib-env-parse = { path = "../../lib/lib-env-parse" }

tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["io"] }
axum = { version = "0.7", features = ["macros"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
