[package]
name = "hive-obs-file"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "File-based log storage observability plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
chrono.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["sync"] }
dirs = "6"

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.obs.file"
name = "File Observer"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "observability", "logging", "file"]

[package.metadata.plugin.hive]
category = "obs"
name = "file"
