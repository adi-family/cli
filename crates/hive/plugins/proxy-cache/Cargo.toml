[package]
name = "hive-proxy-cache"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Response caching proxy middleware plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["sync", "time"] }
sha2 = "0.10"

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.proxy.cache"
name = "Response Cache"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "proxy", "cache", "performance"]

[package.metadata.plugin.hive]
category = "proxy"
name = "cache"
