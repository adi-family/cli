[package]
name = "hive-obs-prometheus"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Prometheus metrics observability plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["sync"] }

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.obs.prometheus"
name = "Prometheus"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "obs", "prometheus", "metrics"]

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

[package.metadata.plugin.hive]
category = "obs"
name = "prometheus"
