[package]
name = "hive-proxy-rate-limit"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Rate limiting middleware plugin for Hive proxy"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tokio.workspace = true
tracing.workspace = true

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.proxy.rate-limit"
name = "Rate Limit Middleware"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "proxy", "middleware", "rate-limit", "http"]

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

[package.metadata.plugin.hive]
category = "proxy"
name = "rate-limit"
