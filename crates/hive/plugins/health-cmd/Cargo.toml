[package]
name = "hive-health-cmd"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Command health check plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["process", "time"] }

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.health.cmd"
name = "Command Health Check"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "health", "cmd", "command"]

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

[package.metadata.plugin.hive]
category = "health"
name = "cmd"
