[package]
name = "hive-health-grpc"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "gRPC health check plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["net", "time"] }

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.health.grpc"
name = "gRPC Health Check"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "health", "grpc"]

[package.metadata.plugin.hive]
category = "health"
name = "grpc"
