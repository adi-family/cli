[package]
name = "hive-runner-watcher"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "File watcher runner plugin for Hive - restarts services on file changes"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tokio.workspace = true
tracing.workspace = true
notify.workspace = true
glob = "0.3"
dashmap = "6"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.runner.watcher"
name = "Watcher Runner"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "runner", "watcher", "development"]

[package.metadata.plugin.hive]
category = "runner"
name = "watcher"
