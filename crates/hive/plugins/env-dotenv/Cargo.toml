[package]
name = "hive-env-dotenv"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Dotenv environment plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
anyhow.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tempfile.workspace = true

[package.metadata.plugin]
id = "hive.env.dotenv"
name = "Dotenv Environment"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "env", "dotenv", "environment"]

[package.metadata.plugin.hive]
category = "env"
name = "dotenv"
