[package]
name = "hive-proxy-auth-basic"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "HTTP Basic authentication proxy middleware plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
base64.workspace = true
shellexpand.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.proxy.auth.basic"
name = "Basic Authentication"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "proxy", "auth", "basic", "security"]

[package.metadata.plugin.hive]
category = "proxy"
name = "auth.basic"
