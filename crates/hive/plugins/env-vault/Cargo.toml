[package]
name = "hive-env-vault"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "HashiCorp Vault environment plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
lib-env-parse = { path = "../../../_lib/lib-env-parse" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
reqwest = { workspace = true, features = ["json"] }
tokio.workspace = true

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.env.vault"
name = "Vault Environment"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "env", "vault", "secrets"]

[package.metadata.plugin.hive]
category = "env"
name = "vault"
