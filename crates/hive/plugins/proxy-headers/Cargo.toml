[package]
name = "hive-proxy-headers"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Header manipulation proxy middleware plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.proxy.headers"
name = "Headers"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "proxy", "headers"]

[package.metadata.plugin.hive]
category = "proxy"
name = "headers"
