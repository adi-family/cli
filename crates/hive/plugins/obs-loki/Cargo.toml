[package]
name = "hive-obs-loki"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Grafana Loki observability plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
reqwest = { workspace = true, features = ["json"] }
tokio = { workspace = true, features = ["sync", "time", "rt-multi-thread"] }
chrono.workspace = true

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.obs.loki"
name = "Loki"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "obs", "loki", "logging", "grafana"]

[package.metadata.plugin.hive]
category = "obs"
name = "loki"
