[package]
name = "hive-proxy-auth-api-key"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "API key authentication proxy middleware plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
lib-env-parse = { path = "../../../_lib/lib-env-parse" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
sha2 = "0.10"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.proxy.auth.api-key"
name = "API Key Authentication"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "proxy", "auth", "api-key", "security"]

[package.metadata.plugin.hive]
category = "proxy"
name = "auth.api-key"
