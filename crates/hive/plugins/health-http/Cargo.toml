[package]
name = "hive-health-http"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "HTTP health check plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true
tokio.workspace = true
reqwest.workspace = true

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.health.http"
name = "HTTP Health Check"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "health", "http"]

[package.metadata.plugin.hive]
category = "health"
name = "http"
