[package]
name = "hive-rollout-recreate"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Recreate rollout strategy plugin for Hive"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../../_lib/lib-plugin-abi-v3" }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing.workspace = true

[features]
default = ["plugin"]
plugin = []

[package.metadata.plugin]
id = "hive.rollout.recreate"
name = "Recreate Rollout"
type = "hive-plugin"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[package.metadata.plugin.tags]
categories = ["hive", "rollout", "recreate"]

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

[package.metadata.plugin.hive]
category = "rollout"
name = "recreate"
