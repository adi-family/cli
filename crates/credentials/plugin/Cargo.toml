[package]
name = "credentials-plugin"
version = "0.1.0"
edition = "2021"
description = "ADI plugin: Credentials HTTP server"
license = "BSL-1.0"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-abi-v3 = { path = "../../lib/lib-plugin-abi-v3" }
credentials-http = { path = "../http" }
async-trait = "0.1"
anyhow = "1"

[package.metadata.plugin]
id = "adi.credentials"
name = "Credentials"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[[package.metadata.plugin.provides]]
id = "adi.credentials.cli"
version = "1.0.0"
description = "CLI commands for credentials HTTP server"

[package.metadata.plugin.tags]
categories = ["credentials", "server", "http"]
