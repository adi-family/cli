[package]
name = "analytics-plugin"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
description = "ADI plugin: Analytics HTTP servers (read API + ingestion)"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "analytics-http"
path = "src/bin/analytics_http.rs"

[[bin]]
name = "analytics-ingestion"
path = "src/bin/analytics_ingestion.rs"

[dependencies]
# Analytics crates
analytics-core = { path = "../core" }
analytics-client = { path = "../client" }

# Plugin ABI
lib-plugin-abi-v3 = { path = "../../_lib/lib-plugin-abi-v3" }
async-trait = "0.1"

# Web framework
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors"] }

# Async runtime
tokio = { version = "1.42", features = ["full"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Environment variables
dotenvy = "0.15"

# HTTP utilities
lib-http-common = { path = "../../_lib/lib-http-common" }

# Environment
lib-env-parse = { path = "../../_lib/lib-env-parse" }

# Error handling
anyhow = "1.0"

[package.metadata.plugin]
id = "adi.analytics"
name = "Analytics"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[[package.metadata.plugin.provides]]
id = "adi.analytics.cli"
version = "1.0.0"
description = "CLI commands for analytics HTTP servers"

[package.metadata.plugin.tags]
categories = ["analytics", "server", "http"]
