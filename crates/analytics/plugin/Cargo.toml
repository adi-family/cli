[package]
name = "analytics-plugin"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
description = "HTTP servers for ADI Analytics read API and ingestion API"

[[bin]]
name = "analytics-http"
path = "src/bin/analytics_http.rs"

[[bin]]
name = "analytics-ingestion"
path = "src/bin/analytics_ingestion.rs"

[dependencies]
# Analytics crates
analytics-core = { path = "../core" }
analytics-client = { path = "../client" }

# Web framework
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors"] }

# Async runtime
tokio = { version = "1.42", features = ["full"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Environment variables
dotenvy = "0.15"

# HTTP utilities
lib-http-common = { path = "../../lib/lib-http-common" }

# Environment
lib-env-parse = { path = "../../lib/lib-env-parse" }

# Logging
lib-logging-core = { path = "../../lib/lib-logging-core", features = ["axum-08-compat"] }

# Error handling
anyhow = "1.0"
