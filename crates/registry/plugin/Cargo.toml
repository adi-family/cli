[package]
name = "adi-registry"
version = "0.1.0"
edition = "2021"
description = "ADI plugin: local plugin registry server"
license = "BSL-1.0"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "adi-registry-server"
path = "src/main.rs"

[dependencies]
tracing-subscriber = { workspace = true }
# Plugin ABI
lib-plugin-abi-v3 = { path = "../../_lib/lib-plugin-abi-v3" }

# Registry storage
plugin-registry-core = { workspace = true }

# Web framework
axum = { workspace = true }
tower-http = { workspace = true, features = ["cors", "trace"] }

# Async
tokio = { workspace = true }
tokio-util = { version = "0.7", features = ["io"] }
async-trait = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Directories
dirs = { workspace = true }

[package.metadata.plugin]
id = "adi.registry"
name = "Registry"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"

[[package.metadata.plugin.provides]]
id = "adi.registry.cli"
version = "1.0.0"
description = "CLI commands for local registry management"

[package.metadata.plugin.tags]
categories = ["registry", "server", "plugins"]
