[package]
name = "tasks-core"
version = "0.8.3"
edition = "2021"
license-file = "LICENSE"
authors = ["ADI Team"]
description = "Core library for ADI Tasks - task management with dependency graphs"

[dependencies]
thiserror = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rusqlite = { version = "0.31", features = ["bundled"] }
dirs = "6"
tracing = "0.1"
lib-migrations = { path = "../../_lib/lib-migrations" }
lib-adi-service = { path = "../../_lib/lib-adi-service" }
async-trait = "0.1"
bytes = "1"
tokio = { version = "1", features = ["sync"] }

[build-dependencies]
typespec-api = { package = "lib-typespec-api", path = "../../tsp-gen/core" }

[dev-dependencies]
tempfile = "3.24"
tokio = { version = "1", features = ["rt", "macros"] }
