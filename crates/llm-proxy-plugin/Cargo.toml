[package]
name = "llm-proxy-plugin"
version = "0.8.4"
edition = "2021"
license = "BSL-1.0"
authors = ["ADI Team"]
description = "ADI LLM Proxy CLI plugin for managing proxy tokens and keys"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Plugin ABI
lib-plugin-abi-v3 = { path = "../lib/lib-plugin-abi-v3" }

# Environment
lib-env-parse = { path = "../lib/lib-env-parse" }

# Serialization
serde.workspace = true
serde_json.workspace = true

# Async runtime
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

# HTTP client for API calls
reqwest = { workspace = true, features = ["json", "blocking"] }

# CLI formatting
console.workspace = true

# Global state
once_cell = "1.21"
