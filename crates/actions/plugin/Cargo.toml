[package]
name = "actions-plugin"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
description = "Action card system for cross-plugin notifications"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib"]

[dependencies]
lib-plugin-prelude = { path = "../../_lib/lib-plugin-prelude" }

[package.metadata.plugin]
id = "adi.actions"
name = "ADI Actions"
type = "core"

[package.metadata.plugin.compatibility]
min_host_version = "2.0.0"

[[package.metadata.plugin.provides]]
id = "adi.actions.web"
version = "1.0.0"
description = "Action card system for cross-plugin notifications"

[package.metadata.plugin.web_ui]
entry = "web.js"
sandbox = false

[package.metadata.plugin.tags]
categories = ["web"]
