[package]
name = "cocoon-control-center-plugin"
version = "0.1.0"
edition = "2021"
description = "ADI plugin: Cocoon Control Center - terminal UI for remote cocoon management"
license = "BSL-1.0"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-prelude = { path = "../../_lib/lib-plugin-prelude" }

[build-dependencies]
lib-plugin-web-build = { path = "../../_lib/lib-plugin-web-build" }

[package.metadata.plugin]
id = "adi.cocoon-control-center"
name = "Cocoon Control Center"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"
api_version = 3

[package.metadata.plugin.web_ui]
entry = "web.js"
sandbox = false
plugin_class = "CocoonControlCenterPlugin"

[package.metadata.plugin.tags]
categories = ["cocoon", "terminal", "tools"]
