[package]
name = "command-palette-plugin"
version = "0.1.0"
edition = "2021"
license = "BSL-1.0"
description = "Command palette for quick command search and execution"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib"]

[dependencies]
lib-plugin-prelude = { path = "../../_lib/lib-plugin-prelude" }

[build-dependencies]
lib-plugin-web-build = { path = "../../_lib/lib-plugin-web-build" }

[package.metadata.plugin]
id = "adi.command-palette"
name = "ADI Command Palette"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "2.0.0"

[[package.metadata.plugin.provides]]
id = "adi.command-palette.web"
version = "1.0.0"
description = "Command palette for quick command search and execution"

[package.metadata.plugin.web_ui]
entry = "web.js"
sandbox = false
plugin_class = "CommandPalettePlugin"

[package.metadata.plugin.tags]
categories = ["web"]
