[package]
name = "shortcuts-plugin"
version = "0.1.0"
edition = "2021"
license = "BSL-1.1"
description = "ADI Shortcuts plugin - URL redirect service"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib"]

[dependencies]
lib-plugin-prelude = { path = "../_lib/lib-plugin-prelude" }
axum = { version = "0.7", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yml = "0.0.12"

[package.metadata.plugin]
id = "adi.shortcuts"
name = "Shortcuts"
type = "core"

[package.metadata.plugin.compatibility]
api_version = 3
min_host_version = "0.8.0"

[[package.metadata.plugin.provides]]
id = "adi.shortcuts.http"
version = "1.0.0"
description = "HTTP routes for shortcut URL redirects"

[package.metadata.plugin.tags]
categories = ["shortcuts", "redirect", "http"]
