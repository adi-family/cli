[package]
name = "llm-proxy-plugin"
version = "0.8.4"
edition = "2021"
license = "BSL-1.0"
authors = ["ADI Team"]
description = "ADI LLM Proxy plugin - web UI for LLM API proxy management"

[lib]
crate-type = ["cdylib"]

[dependencies]
lib-plugin-prelude = { path = "../../../../crates/_lib/lib-plugin-prelude" }

[build-dependencies]
lib-plugin-web-build = { path = "../../../../crates/_lib/lib-plugin-web-build" }

[package.metadata.plugin]
id = "adi.llm-proxy"
name = "LLM Proxy"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "2.0.0"

[[package.metadata.plugin.provides]]
id = "adi.llm-proxy.cli"
version = "0.1.0"
description = "CLI commands for LLM proxy management"

[package.metadata.plugin.web_ui]
entry = "web.js"
sandbox = false
plugin_class = "LlmProxyPlugin"

[package.metadata.plugin.tags]
categories = ["llm", "proxy", "api"]
