[package]
name = "llm-proxy-http"
version = "0.8.4"
edition = "2021"
license = "BSL-1.0"
authors = ["ADI Team"]
description = "ADI LLM Proxy HTTP server - RESTful API + /v1 proxy forwarding"

[[bin]]
name = "llm-proxy"
path = "src/main.rs"

[[bin]]
name = "llm-proxy-migrate"
path = "src/migrate.rs"

[dependencies]
llm-proxy-core = { path = "../core" }
lib-http-common = { path = "../../../../crates/_lib/lib-http-common" }
lib-env-parse = { path = "../../../../crates/_lib/lib-env-parse" }

# Web framework
axum = { version = "0.7", features = ["macros"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }
tower = "0.5"

# Runtime
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal"] }
tokio-stream = "0.1"

# Serialization
serde.workspace = true
serde_json.workspace = true

# Auth
jsonwebtoken = "9"

# Types
uuid.workspace = true
chrono.workspace = true
rust_decimal = { version = "1", features = ["serde"] }

# Async
async-trait.workspace = true
futures.workspace = true
bytes = "1"

# Observability
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Database (for migrations binary)
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "migrate"] }

# HTTP types
http = "1"

# Env
dotenvy = "0.15"
