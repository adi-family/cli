[package]
name = "auth-core"
version = "0.8.4"
edition = "2021"
license = "BSL-1.0"
description = "Core library for ADI Auth - email-based passwordless authentication"

[features]
default = []
axum = ["dep:axum"]

[dependencies]
lib-migrations-sql = { git = "https://github.com/adi-family/lib-migrations-sql.git" }
lib-env-parse = { path = "../../../../crates/_lib/lib-env-parse" }
thiserror = "2"
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid"] }
dirs = "6"
tracing = "0.1"
jsonwebtoken = "9"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
fastrand = "2"
argon2 = "0.5"
lettre = { version = "0.11", default-features = false, features = ["tokio1-rustls-tls", "builder", "smtp-transport"] }
axum = { version = "0.7", optional = true }
totp-rs = { version = "5.6", features = ["qr", "gen_secret"] }
base32 = "0.5"

[dev-dependencies]
tempfile = "3.10"
