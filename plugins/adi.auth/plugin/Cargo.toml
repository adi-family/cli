[package]
name = "auth-plugin"
version = "0.1.0"
edition = "2021"
description = "ADI plugin: Auth HTTP server"
license = "BSL-1.0"
authors = ["ADI Team"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lib-plugin-prelude = { path = "../../../crates/_lib/lib-plugin-prelude" }
auth-http = { path = "../http" }

[build-dependencies]
lib-plugin-web-build = { path = "../../../crates/_lib/lib-plugin-web-build" }

[package.metadata.plugin]
id = "adi.auth"
name = "Auth"
type = "extension"

[package.metadata.plugin.compatibility]
min_host_version = "0.8.0"
api_version = 3

[package.metadata.plugin.cli]
command = "auth"
description = "Authentication HTTP server"

[[package.metadata.plugin.provides]]
id = "adi.auth.cli"
version = "1.0.0"
description = "CLI commands for authentication"

[package.metadata.plugin.web_ui]
entry = "web.js"
sandbox = false
plugin_class = "AuthPlugin"

[package.metadata.plugin.tags]
categories = ["auth", "server", "http"]
