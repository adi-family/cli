[package]
name = "auth-http"
version = "0.8.4"
edition = "2021"
license = "BSL-1.0"
description = "HTTP API server for ADI Auth - email-based passwordless authentication"

[lib]
name = "auth_http"
path = "src/lib.rs"

[dependencies]
auth-core = { path = "../core" }
axum = "0.7"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
lib-env-parse = { path = "../../../crates/_lib/lib-env-parse" }
lib-http-common = { path = "../../../crates/_lib/lib-http-common" }
anyhow = "1"
dotenvy = "0.15"
